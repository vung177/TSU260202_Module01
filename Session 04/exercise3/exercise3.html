<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="exercise3.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Liên hệ với chúng tôi</h1>
      <div class="form-body">
        <label for=""><strong>Họ và tên:</strong></label>
        <br />
        <input
          type="text"
          class="form-input"
          placeholder="Nhập họ và tên của bạn"
        />
        <br />
        <label for=""><strong>Email:</strong></label>
        <br />
        <input
          type="email"
          class="form-input"
          placeholder="Nhập email của bạn"
        />
        <br />
        <label for=""><strong>Tin nhắn:</strong></label>
        <br />
        <textarea
          name="messages"
          class="form-input"
          placeholder="Vui lòng nhập tin nhắn của bạn"
        ></textarea>
        <br />
        <button class="btn">Gửi</button>
      </div>
    </div>
  </body>
</html>
