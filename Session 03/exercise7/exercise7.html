<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="exercise7.css" />
  </head>
  <body>
    <div class="container">
      <form action="">
        <h2 class="form-title">SỞ THÍCH CỦA BẠN</h2>
        <div class="form-body">
          <section class="area1">
            <section class="area1">
              <div class="title">Họ và tên:</div>
              <div class="title">Email:</div>
              <div class="title">Sở thích:</div>
            </section>
          </section>

          <section class="area2">
            <div>
              <div>
                <input
                  type="text"
                  class="input"
                  placeholder="Vui lòng nhập họ và tên"
                />
                <input
                  type="email"
                  class="input"
                  placeholder="Vui lòng nhập email"
                />
              </div>

              <div class="hobby-list">
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Thể thao
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Âm nhạc
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Du lịch
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Đọc sách
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Nấu ăn
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Chơi game
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Lướt web
                </div>
                <div class="hobby">
                  <input type="checkbox" class="checkbox" />Điện ảnh
                </div>
              </div>
            </div>
          </section>
        </div>

        <button type="submit" class="btn">Gửi thông tin</button>
        <button type="reset" class="btn">Nhập lại</button>
      </form>
    </div>
  </body>
</html>
