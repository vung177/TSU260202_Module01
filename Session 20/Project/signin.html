<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./signin.css" />
  </head>
  <body>
    <section class="container mt-3">
      <section class="row justify-content-center">
        <section class="card col-6 shadow p-4">
          <div class="p-0">
            <h2 class="mt-3 fw-semibold">Đăng nhập</h2>
            <p>Đăng nhập tài khoản để sử dụng hệ thống quản lý</p>
          </div>

          <form>
            <div class="row mb-3">
              <div class="col-12">
                <label for="" class="form-label fw-semibold">Email:</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Hãy nhập email của bạn"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-12">
                <label for="" class="form-label fw-semibold">Mật khẩu:</label>
                <input
                  type="password"
                  class="form-control"
                  placeholder="••••••••"
                  required
                />
              </div>
            </div>

            <div class="mb-3 d-flex justify-content-between align-items-center">
              <div class="form-check mb-0">
                <input type="checkbox" class="form-check-input" id="saveId" />
                <label for="saveId" class="form-check-label">
                  <span>Ghi nhớ tài khoản</span></label
                >
              </div>

              <a href="#" class="text-decoration-none">Quên mật khẩu?</a>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary btn-lg">Đăng nhập</button>
            </div>

            <div class="text-center mt-4">
              <span>Bạn chưa có tài khoản?</span>
              <a href="#" class="text-decoration-none">Đăng ký</a>
            </div>
          </form>
        </section>
      </section>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="signin.js"></script>
  </body>
</html>
