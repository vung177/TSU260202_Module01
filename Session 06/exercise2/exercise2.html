<!doctype html>
<html lang="en">
  <head>

    <title>Document</title>
    <link rel="stylesheet" href="exercise2.css" />

  <body>
    <section class="container">
      <h1>Đăng Ký</h1>
      <label for="name" class="name">Họ và tên:</label>
      <input type="text" class="input" placeholder="Vui lòng nhập họ và tên" />
      <label for="email" class="email">Email:</label>
      <input type="text" class="input" placeholder="Vui lòng nhập email" />
      <label for="password" class="pw">Mật khẩu:</label>
      <input
        type="password"
        class="input"
        placeholder="Vui lòng nhập mật khẩu"
      />
      <button class="btn input">Đăng ký</button>
    </section>
  </body>
