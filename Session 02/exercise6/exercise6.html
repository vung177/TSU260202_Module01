<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Trang web bán hàng</h2>
    <ul>
      <li><a href="" class="">Trang chủ</a></li>
      <li><a href="" class="">Sản phẩm</a></li>
      <li><a href="" class="">Giới thiệu</a></li>
      <li><a href="" class="">Liên hệ</a></li>
    </ul>
    <h3>Thông tin sản phẩm</h3>
    <table border="1" cellspacing="3" cellpadding="5">
      <thead>
        <tr>
          <th>Tên sản phẩm</th>
          <th>Mô tả</th>
          <th>Giá</th>
          <th>Số lượng</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Sản phẩm 1</td>
          <td>Mô tả sản phẩm 1</td>
          <td>100.000đ</td>
          <td>10</td>
        </tr>
        <tr>
          <td>Sản phẩm 2</td>
          <td>Mô tả sản phẩm 2</td>
          <td>200.000đ</td>
          <td>5</td>
        </tr>
        <tr>
          <td>Sản phẩm 3</td>
          <td>Mô tả sản phẩm 3</td>
          <td>300.000đ</td>
          <td>3</td>
        </tr>
      </tbody>
    </table>
    <h3>Thông tin người dùng</h3>
    <form action="" class="">
      <!--  -->
      <label for="name" class="name"
        >Họ và tên: <input type="text" placeholder="Vui lòng nhập họ và tên"
      /></label>
      <br class="break" />

      <label for="email" class="email"
        >Email: <input type="email" placeholder="Vui lòng nhập email"
      /></label>
      <br class="break" />

      <label for="phone" class="phone"
        >Số điện thoại:
        <input type="number" placeholder="Vui lòng nhập số điện thoại"
      /></label>
      <br class="break" />

      <label for="address" class="address"
        >Địa chỉ: <input type="text" placeholder="Vui lòng nhập địa chỉ"
      /></label>
      <br class="break" />

      <button class="submit">Đặt hàng</button>
      <br class="break" />
      <p>&copy; 2023 Trang web bán hàng</p>
    </form>
  </body>
</html>
